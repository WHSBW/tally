<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tally — My Stats</title>

<!-- ============================================================
     TALLY — student stats page (read-only, token-gated)
     ------------------------------------------------------------
     A student opens this with their personal link:
        student.html?t=THEIR_TOKEN
     It shows ONLY their own numbers + anonymized class aggregates.
     No login, no way to see anyone else's name or score.

     SETUP: paste the same anon public key you used in the tapping app.
     (Safe to expose — get_student_stats is the only thing anon can
     touch, and it only ever returns the one student the token matches.)
     ============================================================ -->
<script>
  const SUPABASE_URL      = "https://rfhdonhjlpqhltipefdt.supabase.co";
  const SUPABASE_ANON_KEY = "PASTE_YOUR_ANON_PUBLIC_KEY_HERE";
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --cream:#F5F1E8; --ink:#23262b; --muted:#8c8475; --line:#e0d9c9;
    --blue:#2e6da4; --blue-deep:#1f5384; --tile:#c8dcef; --tile-edge:#aac6e6;
    --gold:#caa12f; --silver:#9aa3ab; --bronze:#b07a52;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; background:var(--cream); color:var(--ink);
    font-family:Inter,system-ui,sans-serif; -webkit-font-smoothing:antialiased}
  body{max-width:560px; margin:0 auto; padding:22px 22px 40px}
  .serif{font-family:Fraunces,Georgia,serif}
  .eyebrow{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:600}
  .hidden{display:none !important}
  hr{border:none; border-top:1px solid var(--line); margin:22px 0}

  header{display:flex; align-items:baseline; gap:10px; margin-bottom:26px}
  .wordmark{font-size:26px; font-weight:700; letter-spacing:-.01em}
  .wordmark .dot{color:var(--blue)}

  .name{font-size:32px; font-weight:600; line-height:1.05}
  .sub{color:var(--muted); font-size:13.5px; margin-top:6px}

  .bigrow{display:flex; justify-content:space-between; align-items:flex-end; margin-top:24px}
  .big .n{font-size:52px; font-weight:600; line-height:.9}
  .big .n.blue{color:var(--blue)}
  .big.right{text-align:right}
  .big .k{margin-top:8px}

  .midrow{display:flex; justify-content:space-between; align-items:flex-start; gap:16px}
  .midrow .n{font-size:26px; font-weight:600; line-height:1}
  .midrow .k{margin-top:5px}
  .midrow .right{text-align:right}
  .rank .delta{font-size:12.5px; color:var(--muted); margin-top:4px}
  .versus{font-size:12.5px; color:var(--muted); margin-top:10px; line-height:1.5}
  .versus b{color:var(--blue); font-weight:600}

  .top3 .row{display:flex; align-items:center; gap:11px; margin-top:11px; font-size:15px}
  .medal{width:22px; height:22px; border-radius:50%; color:#fff; font-size:11px; font-weight:700;
    display:grid; place-items:center; flex:0 0 auto}
  .m1{background:var(--gold)} .m2{background:var(--silver)} .m3{background:var(--bronze)}
  .top3 .row b{margin-left:auto; font-weight:600}

  .parthead{display:flex; justify-content:space-between; align-items:baseline}
  .parthead .days{font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase}
  .bars{display:flex; align-items:flex-end; gap:5px; height:84px; margin:16px 0 6px}
  .bar{flex:1 1 0; border-radius:4px 4px 2px 2px; min-height:4px; background:var(--tile-edge)}
  .bar.on{background:var(--blue)}
  .bardates{display:flex; justify-content:space-between; color:var(--muted); font-size:11px}

  .foot{text-align:center; color:var(--muted); font-size:12.5px; margin-top:30px; line-height:1.5}

  .state{text-align:center; padding:60px 16px; color:var(--muted); font-size:14px; line-height:1.6}
  .state .wordmark{display:block; font-size:38px; margin-bottom:18px; color:var(--ink)}
</style>
</head>
<body>

<div id="loading" class="state"><span class="wordmark serif">Tally<span class="dot" style="color:var(--blue)">.</span></span>Loading your stats…</div>

<div id="problem" class="state hidden">
  <span class="wordmark serif">Tally<span class="dot" style="color:var(--blue)">.</span></span>
  <span id="problemMsg"></span>
</div>

<main id="card" class="hidden">
  <header>
    <span class="wordmark serif">Tally<span class="dot">.</span></span>
    <span class="eyebrow">My stats</span>
  </header>

  <div class="name serif" id="name"></div>
  <div class="sub" id="sub"></div>

  <div class="bigrow">
    <div class="big"><div class="n blue serif" id="points"></div><div class="k eyebrow">Your points</div></div>
    <div class="big right"><div class="n serif" id="grade"></div><div class="k eyebrow">Grade</div></div>
  </div>

  <hr>

  <div class="midrow">
    <div>
      <div class="n serif" id="sectionAvg"></div>
      <div class="k eyebrow">Your class average</div>
      <div class="versus" id="versus"></div>
    </div>
    <div class="right rank">
      <div class="n serif" id="rank"></div>
      <div class="k eyebrow">Your rank</div>
      <div class="delta" id="delta"></div>
    </div>
  </div>

  <hr>

  <div class="eyebrow">Top 3 ★</div>
  <div class="top3" id="top3"></div>

  <hr>

  <div class="parthead">
    <span class="eyebrow">Your participation · this cycle</span>
    <span class="days" id="daysLabel"></span>
  </div>
  <div class="bars" id="bars"></div>
  <div class="bardates"><span id="dateStart"></span><span id="dateEnd"></span></div>

  <div class="foot">Only you can see this — your classmates' scores stay private.</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
"use strict";
const $ = s => document.querySelector(s);
const show = (id,on=true)=>$(id).classList.toggle("hidden",!on);

function problem(msg){ show("#loading",false); show("#card",false); $("#problemMsg").textContent=msg; show("#problem"); }

const token = new URLSearchParams(location.search).get("t");
const ordinal = n => { const s=["th","st","nd","rd"], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); };
const fmtDate = d => d ? new Date(d+"T00:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric"}) : "";

(async function(){
  if(!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.startsWith("PASTE_")){
    problem("This page needs its key set. (If you're a student seeing this, let Ms. Novello know.)"); return;
  }
  if(!token){ problem("This link is missing its code. Ask Ms. Novello for your personal link."); return; }

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let data;
  try{
    const { data:res, error } = await sb.rpc("get_student_stats",{ p_token:token });
    if(error) throw error;
    data = res;
  }catch(e){ problem("Couldn't reach your stats right now. Try again in a minute."); return; }

  if(!data){
    problem("We couldn't find your stats yet. If this link is new, your teacher may not have published this cycle — check back soon. If it keeps happening, ask Ms. Novello for a fresh link.");
    return;
  }
  render(data);
})();

function render(d){
  show("#loading",false); show("#card");

  $("#name").textContent  = d.name || "—";
  $("#sub").textContent   = [d.section, d.cycle].filter(Boolean).join(" · ");
  $("#points").textContent = d.points ?? 0;
  $("#grade").innerHTML    = (d.grade ?? 0) + '<span style="font-size:.5em;font-weight:500">%</span>';

  const secAvg = d.section_avg!=null ? Number(d.section_avg) : null;
  const clsAvg = d.class_avg!=null ? Number(d.class_avg) : null;
  $("#sectionAvg").textContent = secAvg!=null ? secAvg.toFixed(1) : "–";

  // rank
  $("#rank").innerHTML = d.rank ? `#${d.rank} <span style="font-size:.55em;color:var(--muted)">of ${d.section_size}</span>` : "–";
  if(secAvg!=null){
    const diff = (d.points||0) - secAvg;
    $("#delta").textContent = (Math.abs(diff)<0.05) ? "right at the average"
      : `${Math.abs(diff).toFixed(1)} ${diff>0?"above":"below"} average`;
  }

  // section vs whole grade — the bragging-rights line
  if(secAvg!=null && clsAvg!=null){
    const gap = secAvg - clsAvg;
    let tail;
    if(Math.abs(gap)<0.05) tail = `dead even with the whole grade (<b>${clsAvg.toFixed(1)}</b>).`;
    else tail = `<b>${Math.abs(gap).toFixed(1)} ${gap>0?"above":"below"}</b> the whole grade (${clsAvg.toFixed(1)}).`;
    $("#versus").innerHTML = `Your period is ${tail}`;
  }

  // top 3 (anonymized — placements only)
  const t3 = Array.isArray(d.top3) ? d.top3 : [];
  const place = ["1st place","2nd place","3rd place"], medals=["m1","m2","m3"];
  $("#top3").innerHTML = t3.length
    ? t3.slice(0,3).map((r,i)=>`<div class="row"><span class="medal ${medals[i]}">${i+1}</span>${place[i]}<b>${r.score}</b></div>`).join("")
    : '<div class="row" style="color:var(--muted)">Not enough yet</div>';

  // participation bars
  const daily = Array.isArray(d.daily) ? d.daily : [];
  const pdays = d.participation_days || daily.length;
  const cdays = d.class_days || pdays;
  $("#daysLabel").textContent = `${pdays} of ${cdays} class days`;
  const max = Math.max(1, ...daily.map(x=>x.points||0));
  const bars = daily.map(x=>`<div class="bar on" style="height:${Math.max(8, Math.round((x.points||0)/max*100))}%"></div>`);
  for(let i=daily.length; i<cdays; i++) bars.push('<div class="bar" style="height:8%"></div>');
  $("#bars").innerHTML = bars.join("") || '<div class="bar" style="height:8%"></div>';
  if(daily.length){ $("#dateStart").textContent=fmtDate(daily[0].date); $("#dateEnd").textContent=fmtDate(daily[daily.length-1].date); }
}
</script>
</body>
</html>
